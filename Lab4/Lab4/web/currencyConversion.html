<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Currency Conversion</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 40px;
        }
        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }
        .main-header {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 20px;
            border-left: 5px solid #6f42c1;
            padding-left: 15px;
            font-weight: bold;
        }
        .card {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .form-title {
            color: #6f42c1;
            font-size: 1.6rem;
            font-weight: 500;
            margin-top: 0;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
            font-size: 0.9rem;
        }
        input[type="number"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            background-color: #fafafa;
            font-size: 1rem;
        }
        .button-group {
            margin-top: 30px;
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 10px 25px;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            background-color: #e0e0e0;
        }
        .btn:hover {
            background-color: #d4d4d4;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="main-header">
        Use JSP Declaration Tag, JSP Scriptlet and JSP Expression in Application
    </div>

    <div class="card">
        <h2 class="form-title">Currency Conversion</h2>
        
        <form action="processCurrency.jsp" method="POST">
            
            <div class="form-group">
                <label>Amount (in RM)</label>
                <input type="number" name="amount" placeholder="[in RM]" step="0.01" required>
            </div>

            <div class="form-group">
                <label>Convert to</label>
                <select name="currencyType">
                    <option value="1">USD</option>
                    <option value="2">EURO</option>
                    <option value="3">JPY</option>
                    <option value="4">SGD</option>
                </select>
            </div>

            <div class="button-group">
                <button type="submit" class="btn">Submit</button>
                <button type="reset" class="btn">Cancel</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
