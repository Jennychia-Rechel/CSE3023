<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Discount</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 40px;
        }
        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }
        /* Tajuk atas dengan garisan ungu */
        .main-header {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 20px;
            border-left: 5px solid #6f42c1;
            padding-left: 15px;
            font-weight: bold;
        }
        /* Kad Putih */
        .card {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .form-title {
            color: #6f42c1;
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
            font-size: 0.9rem;
        }
        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            background-color: #fafafa;
        }
        /* Radio Buttons */
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        .radio-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9rem;
            color: #555;
        }
        /* Buttons */
        .button-group {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }
        .btn {
            padding: 10px 30px;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            background-color: #e0e0e0;
            color: #333;
        }
        .btn:hover {
            background-color: #d4d4d4;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="main-header">
        Use JSP Scriptlet and JSP Expression in Application
    </div>

    <div class="card">
        <h2 class="form-title">Customer Discount</h2>
        
        <form action="processCustomer.jsp" method="POST">
            <div class="form-group">
                <label>Customer Code</label>
                <input type="text" name="custCode" placeholder="Key-in customer code" required>
            </div>

            <div class="form-group">
                <label>Quantity</label>
                <input type="number" name="quantity" placeholder="Key-in quantity" min="1" required>
            </div>

            <div class="form-group">
                <label>Customer Type</label>
                <div class="radio-group">
                    <div class="radio-item">
                        <input type="radio" name="custType" value="1" id="normal" checked>
                        <label for="normal" style="display:inline; font-weight:normal;">Normal Customer</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" name="custType" value="2" id="privilege">
                        <label for="privilege" style="display:inline; font-weight:normal;">Privilege Customer</label>
                    </div>
                </div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn">Submit</button>
                <button type="reset" class="btn">Cancel</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
